# =============================================================
# Campus Platform 前端 Nginx 配置
# 部署到 B 服务器(8.138.10.124):/etc/nginx/conf.d/campus.conf
# 域名:linyangsheng.top / www.linyangsheng.top
# =============================================================

# 后端 upstream(指向 A 服务器内网/公网)
upstream campus_backend {
    server 114.132.77.204:8080;
    keepalive 32;
}

# HTTP -> HTTPS 跳转(certbot 申请证书后会自动改/添加这一段)
server {
    listen 80;
    listen [::]:80;
    server_name linyangsheng.top www.linyangsheng.top;

    # certbot 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://linyangsheng.top$request_uri;
    }
}

# www 跳裸域
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.linyangsheng.top;

    ssl_certificate     /etc/letsencrypt/live/linyangsheng.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linyangsheng.top/privkey.pem;

    return 301 https://linyangsheng.top$request_uri;
}

# 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name linyangsheng.top;

    ssl_certificate     /etc/letsencrypt/live/linyangsheng.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linyangsheng.top/privkey.pem;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 上传体积上限,与后端 multipart 上限对齐
    client_max_body_size 20m;

    # 前端静态资源
    root /opt/campus-frontend/dist;
    index index.html;

    # SPA 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源强缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 后端 API 反代
    location /api/ {
        proxy_pass http://campus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 用户上传文件:由后端处理(后端会从 /opt/campus-platform/uploads 读)
    location /uploads/ {
        proxy_pass http://campus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 隐藏敏感文件
    location ~ /\.(?!well-known) {
        deny all;
    }
}
