[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    blackbox: end-to-end checks against a deployed server without code access
    smoke: basic service availability checks
    contract: response shape and content quality checks
    deployment: Nginx, SPA fallback, content type, and static asset checks
    negative: invalid input and controlled error checks
    business: campus business module read checks
    api: backend API contract checks
    auth: authentication and token checks
    rbac: role and permission checks
    frontend: frontend routing and static asset checks
    performance: latency and repeated request checks
    security: baseline security checks
