name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend jar
        run: mvn -pl campus-server -am clean package -DskipTests

      - name: Verify jar artifact
        run: test -f campus-server/target/campus-server-1.0.0-SNAPSHOT.jar

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.SERVER_SSH_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload jar to server
        run: |
          scp campus-server/target/campus-server-1.0.0-SNAPSHOT.jar ubuntu@${{ secrets.SERVER_IP }}:/home/ubuntu/campus-server.jar.new

      - name: Restart backend service
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} '
            set -e
            sudo mv /home/ubuntu/campus-server.jar.new /opt/apps/backend/campus-server.jar
            sudo systemctl restart campus-backend
            sudo systemctl status campus-backend --no-pager -l
            curl -I http://127.0.0.1:8080/api/doc.html
          '
