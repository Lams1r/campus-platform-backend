# 生产环境配置(所有敏感信息均强制从环境变量读取,不允许写默认值)
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

mybatis-plus:
  configuration:
    # 生产环境关闭 SQL 控制台打印,改由 logback 写文件
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jetcache:
  remote:
    default:
      uri: ${JETCACHE_REDIS_URI}

campus:
  upload-path: ${UPLOAD_PATH:/opt/campus-platform/uploads}

logging:
  file:
    path: /opt/campus-platform/logs
  level:
    root: INFO
    com.campus: INFO
