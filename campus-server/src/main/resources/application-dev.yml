# 本地开发环境配置(连本地 MySQL / Redis)
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/campus_system?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    # 开发环境打印 SQL 方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jetcache:
  remote:
    default:
      uri: ${JETCACHE_REDIS_URI:redis://127.0.0.1:6379/}

logging:
  file:
    path: ./logs
  level:
    root: INFO
    com.campus: DEBUG
